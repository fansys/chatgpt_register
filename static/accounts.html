<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatGPT 注册管理 · 账号列表</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body class="min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-6">

  <!-- 页头 -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-sm">C</div>
      <div>
        <h1 class="text-[17px] font-bold text-gray-900 leading-tight">ChatGPT 注册管理</h1>
        <p class="text-xs text-gray-400 mt-0.5">批量注册 · 账号管理 · Token 管理</p>
      </div>
    </div>
    <div id="header-actions" class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 bg-green-50 border border-green-200 rounded-full px-3 py-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-xs text-green-700 font-medium">运行中</span>
      </div>
    </div>
  </div>

  <!-- 导航 -->
  <div class="flex gap-1 mb-5 bg-white rounded-xl border border-gray-200 p-1 w-fit shadow-sm">
    <a href="/"         class="tab-btn">⚙️ 配置</a>
    <a href="/register" class="tab-btn">📝 批量注册</a>
    <a href="/accounts" class="tab-btn active">👥 账号列表</a>
    <a href="/tokens"   class="tab-btn">🔑 Token 列表</a>
    <a href="/invalid-accounts" class="tab-btn">🚫 失效列表</a>
  </div>

  <!-- 账号列表 -->
  <div class="card p-6">
    <!-- 工具栏 -->
    <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
      <div class="flex items-center gap-2">
        <h2 class="font-semibold text-gray-800">账号列表</h2>
        <span id="acc-count-badge" class="badge badge-gray hidden"></span>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <span id="acc-sel-tip" class="text-xs text-gray-400 hidden">已选 <b id="acc-sel-n">0</b> 个</span>
        <button id="acc-sync-all-btn" onclick="syncCpaAllFromAccounts()" class="btn btn-cpa btn-sm hidden">◎ CPA 全量校验</button>
        <button id="acc-batch-sync-btn" onclick="batchSyncSelected()" class="btn btn-cpa btn-sm hidden">◎ CPA 校验选中</button>
        <button id="acc-batch-btn" onclick="batchRefreshSelected()" class="btn btn-primary btn-sm hidden">↻ 刷新选中</button>
        <button id="acc-batch-del-btn" onclick="batchDeleteSelected()" class="btn btn-danger btn-sm hidden">删除选中</button>
        <button onclick="loadAccounts()" class="btn btn-ghost btn-sm">↺ 刷新列表</button>
      </div>
    </div>

    <!-- 过滤栏 -->
    <div class="filter-bar">
      <input id="acc-search" type="text" class="filter-inp flex-1 min-w-44" placeholder="🔍 搜索邮箱…" oninput="applyFilters()" />
      <select id="acc-status-filter" class="filter-sel" onchange="applyFilters()">
        <option value="">全部状态</option>
        <option value="ok">正常</option>
        <option value="fail">失败</option>
        <option value="invalid">失效</option>
        <option value="none">未知</option>
      </select>
      <span id="acc-filter-tip" class="text-xs text-gray-400 hidden"></span>
    </div>

    <!-- 表格 -->
    <div class="overflow-x-auto rounded-xl border border-gray-100">
      <table>
        <thead>
          <tr>
            <th class="w-10 text-center"><input type="checkbox" id="acc-all" onchange="toggleAll(this)" /></th>
            <th>#</th>
            <th class="sortable" onclick="sortBy('email')">邮箱<span class="sort-icon" id="sort-email">⇅</span></th>
            <th>ChatGPT 密码</th>
            <th>邮箱密码</th>
            <th class="sortable" onclick="sortBy('status')">OAuth 状态<span class="sort-icon" id="sort-status">⇅</span></th>
            <th class="sortable" onclick="sortBy('token_last_refresh')">Token 最后刷新<span class="sort-icon" id="sort-token_last_refresh">⇅</span></th>
            <th class="sortable" onclick="sortBy('token_expired')">过期时间<span class="sort-icon" id="sort-token_expired">⇅</span></th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="acc-tbody"></tbody>
      </table>
      <div id="acc-empty" class="text-center py-12 text-gray-400 text-sm hidden">暂无账号记录</div>
    </div>
  </div>

</div>

<script src="/static/common.js"></script>
<script>
let _accounts = [];
let _syncEnabled = false;
const _state = { search: '', status: '', sort: null, dir: 'asc' };

async function loadAccounts() {
  try {
    const [cfg, accounts] = await Promise.all([api('GET', '/api/config'), api('GET', '/api/accounts')]);
    _syncEnabled = !!(cfg.upload_api_url && cfg.upload_api_token);
    _accounts = accounts;
    applyFilters();
  } catch (e) { showRequestError(e, '加载账号失败'); }
}

function applyFilters() {
  const search = (document.getElementById('acc-search')?.value ?? '').toLowerCase().trim();
  const status = document.getElementById('acc-status-filter')?.value ?? '';
  _state.search = search; _state.status = status;

  let rows = _accounts.filter(acc => {
    if (search && !acc.email.toLowerCase().includes(search)) return false;
    if (status === 'ok')   return acc.status?.includes('ok') && !acc.status?.includes('fail');
    if (status === 'fail') return acc.status?.includes('fail');
    if (status === 'invalid') return acc.status?.includes('invalid');
    if (status === 'none') return !acc.status || (!acc.status.includes('ok') && !acc.status.includes('fail') && !acc.status.includes('invalid'));
    return true;
  });
  rows = _sortedBy(rows, _state.sort, _state.dir);

  const tip = document.getElementById('acc-filter-tip');
  if (rows.length < _accounts.length) {
    tip.textContent = `显示 ${rows.length} / ${_accounts.length}`; tip.classList.remove('hidden');
  } else { tip.classList.add('hidden'); }

  renderRows(rows);
}

function sortBy(field) {
  if (_state.sort === field) { _state.dir = _state.dir === 'asc' ? 'desc' : 'asc'; }
  else { _state.sort = field; _state.dir = 'asc'; }
  _setSortIcon('sort', field, _state.dir);
  applyFilters();
}

function renderRows(rows) {
  const tbody = document.getElementById('acc-tbody');
  const badge = document.getElementById('acc-count-badge');
  tbody.innerHTML = '';
  badge.textContent = `${_accounts.length} 个账号`;
  badge.classList.toggle('hidden', _accounts.length === 0);
  if (!rows.length) { document.getElementById('acc-empty').classList.remove('hidden'); updateSelection(); return; }
  document.getElementById('acc-empty').classList.add('hidden');

  rows.forEach((acc, i) => {
    const isFailed = acc.status?.includes('fail');
    const isOk     = acc.status?.includes('ok') && !isFailed;
    const sbClass  = isFailed ? 'badge-red' : isOk ? 'badge-green' : 'badge-orange';
    const expired  = isExpired(acc.token_expired);
    const hasToken = !!acc.token_last_refresh;
    const tr = document.createElement('tr');
    if (isFailed) tr.style.background = '#fff8f8';
    tr.innerHTML = `
      <td class="text-center"><input type="checkbox" class="acc-ck" value="${esc(acc.email)}" onchange="updateSelection()" /></td>
      <td class="text-gray-400 text-xs">${i + 1}</td>
      <td><div class="font-medium text-gray-800 text-xs">${esc(acc.email)}</div></td>
      <td>
        <div class="flex items-center gap-1.5">
          <code class="text-xs text-gray-600 bg-gray-50 px-1.5 py-0.5 rounded">${esc(acc.chatgpt_pwd)}</code>
          <button onclick="copyText('${esc(acc.chatgpt_pwd)}')" class="text-blue-400 hover:text-blue-600 text-xs">复制</button>
        </div>
      </td>
      <td class="text-xs text-gray-400">${acc.email_pwd || '—'}</td>
      <td><span class="badge ${sbClass}">${acc.status || '—'}</span></td>
      <td class="text-xs ${hasToken ? (expired ? 'text-red-500 font-medium' : 'text-gray-500') : 'text-gray-300'}">
        ${hasToken ? fmtTime(acc.token_last_refresh) : '未获取'}
      </td>
      <td class="text-xs ${expired ? 'text-red-500 font-medium' : 'text-gray-400'}">
        ${hasToken ? fmtTime(acc.token_expired) : '—'}
        ${expired ? '<span class="badge badge-red ml-1">已过期</span>' : ''}
      </td>
      <td>
        <div class="flex items-center gap-1.5">
          <button onclick="refreshOne('${esc(acc.email)}')" class="btn btn-ghost btn-sm">↻ 刷新</button>
          ${_syncEnabled ? `<button onclick="syncOneFromAccounts('${esc(acc.email)}')" class="btn btn-cpa btn-sm">◎ CPA 校验</button>` : ''}
          <button onclick="deleteOne('${esc(acc.email)}')" class="btn btn-danger btn-sm">删除</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateSelection();
}

function toggleAll(cb) { $$('.acc-ck').forEach(c => { c.checked = cb.checked; }); updateSelection(); }

function updateSelection() {
  const all = [...$$('.acc-ck')];
  const sel = all.filter(c => c.checked);
  const n = sel.length;
  document.getElementById('acc-sel-tip').classList.toggle('hidden', n === 0);
  document.getElementById('acc-sync-all-btn').classList.toggle('hidden', !_syncEnabled);
  document.getElementById('acc-batch-sync-btn').classList.toggle('hidden', n === 0 || !_syncEnabled);
  document.getElementById('acc-batch-btn').classList.toggle('hidden', n === 0);
  document.getElementById('acc-batch-del-btn').classList.toggle('hidden', n === 0);
  if (n > 0) {
    document.getElementById('acc-sel-n').textContent = n;
    document.getElementById('acc-batch-sync-btn').textContent = `◎ CPA 校验选中 (${n})`;
    document.getElementById('acc-batch-btn').textContent = `↻ 刷新选中 (${n})`;
    document.getElementById('acc-batch-del-btn').textContent = `删除选中 (${n})`;
  }
  const allCb = document.getElementById('acc-all');
  allCb.indeterminate = n > 0 && n < all.length;
  allCb.checked = n > 0 && n === all.length;
}

async function refreshOne(email) {
  try {
    const { task_id } = await api('POST', '/api/refresh', { email });
    const entry = openLog(`刷新 ${email}`);
    startPolling(task_id, entry, t => {
      if (t.status === 'done') {
        if (t.result?.invalid_marked) showToast(`[失效标记] ${email} 已加入失效列表`);
        else showToast(`✓ ${email} Token 已刷新`);
        setTimeout(loadAccounts, 800);
      }
      else { showToast('刷新失败', 'error'); }
    });
  } catch (e) { showRequestError(e); }
}

async function syncOneFromAccounts(email) {
  return runSyncCpaFromAccounts([email], `CPA 校验 ${email}`);
}

async function batchSyncSelected() {
  const emails = [...$$('.acc-ck:checked')].map(c => c.value);
  if (!emails.length) return;
  return runSyncCpaFromAccounts(emails, `CPA 校验选中 ×${emails.length}`);
}

async function syncCpaAllFromAccounts() {
  return runSyncCpaFromAccounts([], 'CPA 全量校验');
}

async function runSyncCpaFromAccounts(emails, title) {
  if (!_syncEnabled) {
    showToast('请先在配置里设置 upload_api_url 和 upload_api_token', 'warn');
    return;
  }
  try {
    const { task_id } = await api('POST', '/api/sync-cpa', { emails: Array.isArray(emails) ? emails : [] });
    const entry = openLog(title);
    startPolling(task_id, entry, t => {
      if (t.status !== 'done') {
        showToast('CPA 同步任务失败', 'error');
        return;
      }
      const r = t.result || {};
      showToast(`CPA 同步完成：${formatStats(r, [['ok','ok'], ['刷新','refreshed_401'], ['失效标记','invalid_marked'], ['跳过补传','invalid_skip_upload'], ['补传','uploaded_missing']])}`);
      setTimeout(loadAccounts, 800);
    });
  } catch (e) {
    showTaskStartError(e);
  }
}

async function deleteOne(email) {
  const ok = await showConfirm(`确认删除账号：${email}\n\n同时删除对应的 Token 文件。`);
  if (!ok) return;
  try {
    await api('DELETE', `/api/accounts/${encodeURIComponent(email)}`);
    showToast(`✓ 已删除 ${email}`); loadAccounts();
  } catch (e) { showRequestError(e, '删除失败'); }
}

async function batchRefreshSelected() {
  const emails = [...$$('.acc-ck:checked')].map(c => c.value);
  if (!emails.length) return;
  const btn = document.getElementById('acc-batch-btn'); btn.disabled = true;
  try {
    const { task_id } = await api('POST', '/api/refresh-batch', { emails });
    const entry = openLog(`批量刷新 ×${emails.length}`);
    startPolling(task_id, entry, t => {
      btn.disabled = false;
      if (t.status === 'done') {
        showToast(`批量刷新完成：${formatStats(t.result || {}, [['成功','ok'], ['失效标记','invalid_marked'], ['失败','fail']])}`);
        setTimeout(loadAccounts, 800);
      } else { showToast('批量刷新出错', 'error'); btn.disabled = false; }
    });
  } catch (e) { showTaskStartError(e); btn.disabled = false; }
}

async function batchDeleteSelected() {
  const emails = [...$$('.acc-ck:checked')].map(c => c.value);
  if (!emails.length) return;
  const ok = await showConfirm(`确认删除选中的 ${emails.length} 个账号？\n\n同时删除对应的 Token 文件，操作不可撤销。`);
  if (!ok) return;
  const btn = document.getElementById('acc-batch-del-btn'); btn.disabled = true;
  try {
    const res = await api('POST', '/api/accounts/delete-batch', { emails });
    showToast(`✓ 已删除 ${res.deleted} 个账号${Object.keys(res.errors || {}).length ? `，${Object.keys(res.errors).length} 个失败` : ''}`);
    loadAccounts();
  } catch (e) { showRequestError(e, '批量删除失败'); }
  finally { btn.disabled = false; }
}

loadAccounts();
</script>
</body>
</html>
